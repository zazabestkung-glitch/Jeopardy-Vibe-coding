<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeopardy Media Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        .clue-card { transition: all 0.3s ease; }
        .clue-card:hover { transform: scale(1.02); }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans p-6">

    <div class="max-w-7xl mx-auto mb-6 p-4 bg-slate-800 rounded-xl flex flex-wrap justify-between items-center gap-4 border border-slate-700">
        
        <div class="flex flex-wrap items-center gap-6">
            <div class="flex items-center gap-3">
                <h1 class="text-2xl font-bold tracking-wider text-yellow-400">JEOPARDY!</h1>
                <label class="inline-flex items-center cursor-pointer bg-slate-700 p-2 rounded-lg">
                    <input type="checkbox" id="modeToggle" class="sr-only peer" onchange="toggleMode()">
                    <div class="w-11 h-6 bg-gray-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600 relative"></div>
                    <span class="ms-3 text-sm font-medium" id="modeLabel">Screen Mode (TV)</span>
                </label>
            </div>

            <div class="bg-slate-900/80 px-3 py-1.5 rounded-lg border border-slate-700 flex items-center gap-2">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Room #:</span>
                <input type="number" id="roomInput" value="101" min="1" max="99999" 
                       class="bg-slate-800 border border-slate-600 text-yellow-400 font-bold px-2 py-0.5 rounded w-20 text-center focus:outline-none focus:border-yellow-400"
                       onchange="updateRoomConnection()">
                <span id="connStatus" class="inline-block w-2.5 h-2.5 rounded-full bg-rose-500" title="Disconnected"></span>
            </div>
        </div>

        <div id="hostControls" class="hidden flex flex-wrap gap-4 items-center">
            <div class="flex gap-2">
                <button onclick="adjustGrid('col', 1)" class="bg-emerald-600 hover:bg-emerald-500 px-3 py-1 rounded text-xs font-bold">+ Col</button>
                <button onclick="adjustGrid('col', -1)" class="bg-rose-600 hover:bg-rose-500 px-3 py-1 rounded text-xs font-bold">- Col</button>
                <button onclick="adjustGrid('row', 1)" class="bg-emerald-600 hover:bg-emerald-500 px-3 py-1 rounded text-xs font-bold">+ Row</button>
                <button onclick="adjustGrid('row', -1)" class="bg-rose-600 hover:bg-rose-500 px-3 py-1 rounded text-xs font-bold">- Row</button>
            </div>
            <div class="h-6 w-px bg-slate-600"></div>
            
            <div class="flex gap-2 items-center">
                <span class="text-xs font-bold text-slate-400">Players:</span>
                <button onclick="adjustPlayers(-1)" class="bg-slate-700 px-2 py-0.5 rounded">-</button>
                <span id="playerCountDisplay" class="font-bold">3</span>
                <button onclick="adjustPlayers(1)" class="bg-slate-700 px-2 py-0.5 rounded">+</button>
            </div>
            <div class="h-6 w-px bg-slate-600"></div>

            <div class="flex gap-2">
                <button onclick="saveBoardToFile()" class="bg-indigo-600 hover:bg-indigo-500 px-3 py-1 rounded text-xs font-bold">💾 Save Board</button>
                <label class="bg-sky-600 hover:bg-sky-500 px-3 py-1 rounded text-xs font-bold cursor-pointer">
                    📂 Load Board
                    <input type="file" id="loadBoardInput" accept=".json" class="hidden" onchange="loadBoardFromFile(event)">
                </label>
            </div>
            
            <button onclick="sendAction('reset', {})" class="bg-amber-600 hover:bg-amber-500 px-3 py-1 rounded text-xs font-bold">Reset Played</button>
        </div>
    </div>

    <div class="max-w-7xl mx-auto">
        <div id="jeopardyGrid" class="grid gap-4 mb-8">
            </div>

        <div id="playersContainer" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4 justify-center">
            </div>
    </div>

    <div id="clueModal" class="fixed inset-0 bg-blue-950/95 flex flex-col justify-center items-center p-6 hidden z-50 overflow-y-auto">
        <div id="dailyDoubleBanner" class="hidden text-5xl font-black text-amber-400 tracking-widest mb-4 uppercase text-center animate-bounce">
            🔥 Daily Double! 🔥
        </div>
        
        <div id="modalContent" class="text-center max-w-4xl w-full px-4 flex flex-col items-center">
            <h2 id="modalCategory" class="text-amber-400 text-xl font-bold uppercase tracking-widest mb-1">Category</h2>
            <div id="modalValue" class="text-lg text-slate-400 mb-4">$200</div>
            
            <div id="modalMediaContainer" class="w-full max-w-xl mb-6 hidden">
                </div>

            <p id="modalText" class="text-2xl md:text-4xl font-serif font-bold leading-relaxed mb-8">Clue text...</p>
            
            <div id="modalHostButtons" class="hidden flex flex-col gap-4 items-center w-full">
                <div class="flex gap-4 justify-center">
                    <button onclick="sendAction('revealAnswer', {})" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-lg font-bold">Reveal Answer</button>
                    <button onclick="sendAction('closeClue', {})" class="bg-slate-700 hover:bg-slate-600 px-6 py-2 rounded-lg font-bold">Close & Back</button>
                </div>
                
                <div class="bg-slate-900/90 p-4 rounded-xl border border-slate-700 w-full max-w-2xl">
                    <div id="modalScorePanel" class="grid grid-cols-2 sm:grid-cols-3 gap-3"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="mediaEditModal" class="fixed inset-0 bg-black/80 flex justify-center items-center p-4 hidden z-50">
        <div class="bg-slate-800 p-6 rounded-xl max-w-md w-full border border-slate-700">
            <h3 class="text-xl font-bold mb-4 text-yellow-400">Edit Clue & Media Assets</h3>
            
            <div class="space-y-3 text-sm">
                <div>
                    <label class="block text-slate-400 font-bold mb-1">Clue text / Question:</label>
                    <textarea id="editQuestion" class="w-full bg-slate-900 border border-slate-600 p-2 rounded focus:outline-none focus:border-blue-500" rows="2"></textarea>
                </div>
                <div>
                    <label class="block text-slate-400 font-bold mb-1">Answer:</label>
                    <input type="text" id="editAnswer" class="w-full bg-slate-900 border border-slate-600 p-2 rounded focus:outline-none focus:border-blue-500">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-slate-400 font-bold mb-1">Point Value:</label>
                        <input type="number" id="editValue" class="w-full bg-slate-900 border border-slate-600 p-2 rounded focus:outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-slate-400 font-bold mb-1">Media Attachment:</label>
                        <select id="editMediaType" class="w-full bg-slate-900 border border-slate-600 p-2 rounded focus:outline-none focus:border-blue-500" onchange="toggleMediaInputFields()">
                            <option value="none">None</option>
                            <option value="link">Web Image Link</option>
                            <option value="file">Upload Local Image</option>
                            <option value="youtube">YouTube Video Link</option>
                        </select>
                    </div>
                </div>

                <div id="mediaLinkField" class="hidden">
                    <label class="block text-slate-400 font-bold mb-1">Image URL:</label>
                    <input type="text" id="editMediaUrl" placeholder="https://..." class="w-full bg-slate-900 border border-slate-600 p-2 rounded focus:outline-none focus:border-blue-500">
                </div>

                <div id="mediaFileField" class="hidden">
                    <label class="block text-slate-400 font-bold mb-1">Choose Local Image File:</label>
                    <input type="file" id="editMediaFile" accept="image/*" class="w-full bg-slate-900 text-xs border border-slate-600 p-1 rounded cursor-pointer" onchange="handleLocalImageUpload(event)">
                </div>

                <div id="mediaYoutubeField" class="hidden">
                    <label class="block text-slate-400 font-bold mb-1">YouTube Link / URL:</label>
                    <input type="text" id="editYoutubeUrl" placeholder="https://www.youtube.com/watch?v=..." class="w-full bg-slate-900 border border-slate-600 p-2 rounded focus:outline-none focus:border-blue-500">
                </div>
            </div>

            <div class="flex gap-3 justify-end mt-6">
                <button onclick="closeMediaEditor()" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded font-bold text-sm">Cancel</button>
                <button onclick="saveMediaAssetChanges()" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded font-bold text-sm text-white">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        let mqttClient = null;
        let currentRoomTopic = "";
        let editingTargetKey = null; // Holds target key context while asset editor is active

        let gameState = {
            isController: false,
            rows: 5,
            cols: 5,
            categories: ["History", "Science", "Pop Culture", "Geography", "Sports", "Tech", "Art"],
            players: [
                { name: "Player 1", score: 0 },
                { name: "Player 2", score: 0 },
                { name: "Player 3", score: 0 }
            ],
            clues: {}, 
            activeClue: null, 
            showingAnswer: false
        };

        function initClues() {
            for(let c=0; c<10; c++) {
                for(let r=0; r<10; r++) {
                    const key = `${c}-${r}`;
                    if (!gameState.clues[key]) {
                        gameState.clues[key] = {
                            question: `This is the clue for ${gameState.categories[c] || 'Category'} row ${r+1}.`,
                            answer: `What is the correct answer?`,
                            value: (r + 1) * 200,
                            isDD: false,
                            isRead: false,
                            mediaType: "none", // none, link, file, youtube
                            mediaUrl: ""
                        };
                    }
                }
            }
        }

        // --- Connection Sync Setup ---
        function updateRoomConnection() {
            const roomNum = document.getElementById('roomInput').value || "101";
            const statusIndicator = document.getElementById('connStatus');
            const targetTopic = `jeopardy_global_room_channel_${roomNum}`;

            if (mqttClient) {
                if (currentRoomTopic) mqttClient.unsubscribe(currentRoomTopic);
            } else {
                mqttClient = mqtt.connect('wss://test.mosquitto.org:8081/mqtt');
            }

            statusIndicator.className = "inline-block w-2.5 h-2.5 rounded-full bg-amber-500 animate-pulse";
            currentRoomTopic = targetTopic;

            mqttClient.on('connect', () => {
                mqttClient.subscribe(currentRoomTopic);
                statusIndicator.className = "inline-block w-2.5 h-2.5 rounded-full bg-emerald-500";
                if(gameState.isController) sendAction('syncState', {});
            });

            mqttClient.on('message', (topic, message) => {
                if(topic === currentRoomTopic) {
                    const actionPayload = JSON.parse(message.toString());
                    handleRemoteAction(actionPayload);
                }
            });
        }

        function sendAction(type, data) {
            if (!gameState.isController || !mqttClient) return; 
            const payload = JSON.stringify({ type, data, senderState: gameState });
            mqttClient.publish(currentRoomTopic, payload);
        }

        function handleRemoteAction(payload) {
            const { type, data, senderState } = payload;
            
            if (senderState) {
                gameState.rows = senderState.rows;
                gameState.cols = senderState.cols;
                gameState.players = senderState.players;
                gameState.clues = senderState.clues;
                if(senderState.categories) gameState.categories = senderState.categories;
            }

            if (type === 'openClue') {
                gameState.activeClue = data;
                gameState.showingAnswer = false;
            } else if (type === 'revealAnswer') {
                gameState.showingAnswer = true;
            } else if (type === 'closeClue') {
                gameState.clues[`${gameState.activeClue.col}-${gameState.activeClue.row}`].isRead = true;
                gameState.activeClue = null;
            } else if (type === 'reset') {
                gameState.activeClue = null;
                for (let key in gameState.clues) gameState.clues[key].isRead = false;
            }

            render();
        }

        // --- Media Input Assistant ---
        function openMediaEditor(col, row, event) {
            event.stopPropagation();
            editingTargetKey = `${col}-${row}`;
            const clue = gameState.clues[editingTargetKey];

            document.getElementById('editQuestion').value = clue.question;
            document.getElementById('editAnswer').value = clue.answer;
            document.getElementById('editValue').value = clue.value;
            document.getElementById('editMediaType').value = clue.mediaType || "none";
            
            // Clean inputs
            document.getElementById('editMediaUrl').value = clue.mediaType === 'link' ? clue.mediaUrl : "";
            document.getElementById('editYoutubeUrl').value = clue.mediaType === 'youtube' ? clue.mediaUrl : "";
            document.getElementById('editMediaFile').value = "";
            
            // Temporarily warehouse file data locally inside variable attribute if loaded
            document.getElementById('editMediaFile').dataset.base64 = clue.mediaType === 'file' ? clue.mediaUrl : "";

            toggleMediaInputFields();
            document.getElementById('mediaEditModal').classList.remove('hidden');
        }

        function toggleMediaInputFields() {
            const type = document.getElementById('editMediaType').value;
            document.getElementById('mediaLinkField').classList.toggle('hidden', type !== 'link');
            document.getElementById('mediaFileField').classList.toggle('hidden', type !== 'file');
            document.getElementById('mediaYoutubeField').classList.toggle('hidden', type !== 'youtube');
        }

        function handleLocalImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            // Enforce small assets to fit transaction limits over websocket pipes
            if (file.size > 2 * 1024 * 1024) {
                alert("File size is too large! Please upload images smaller than 2MB.");
                event.target.value = "";
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                // Stash data inside data asset property mapping
                document.getElementById('editMediaFile').dataset.base64 = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function saveMediaAssetChanges() {
            const clue = gameState.clues[editingTargetKey];
            clue.question = document.getElementById('editQuestion').value;
            clue.answer = document.getElementById('editAnswer').value;
            clue.value = parseInt(document.getElementById('editValue').value, 10) || clue.value;
            
            const mediaType = document.getElementById('editMediaType').value;
            clue.mediaType = mediaType;

            if (mediaType === 'none') clue.mediaUrl = "";
            else if (mediaType === 'link') clue.mediaUrl = document.getElementById('editMediaUrl').value;
            else if (mediaType === 'file') clue.mediaUrl = document.getElementById('editMediaFile').dataset.base64 || "";
            else if (mediaType === 'youtube') {
                let rawUrl = document.getElementById('editYoutubeUrl').value;
                clue.mediaUrl = cleanYoutubeUrl(rawUrl);
            }

            closeMediaEditor();
            sendAction('syncState', {});
            render();
        }

        function closeMediaEditor() {
            document.getElementById('mediaEditModal').classList.add('hidden');
            editingTargetKey = null;
        }

        function cleanYoutubeUrl(url) {
            // Helper to parse strings to direct clean embed iframe links
            let regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            let match = url.match(regExp);
            if (match && match[2].length === 11) {
                return `https://www.youtube.com/embed/${match[2]}`;
            }
            return url; // Fallback
        }

        // --- Save / Load Logic ---
        function saveBoardToFile() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({
                rows: gameState.rows,
                cols: gameState.cols,
                categories: gameState.categories,
                players: gameState.players,
                clues: gameState.clues
            }, null, 2));
            
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `jeopardy-room-${document.getElementById('roomInput').value}.json`);
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }

        function loadBoardFromFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedState = JSON.parse(e.target.result);
                    if(importedState.rows) gameState.rows = importedState.rows;
                    if(importedState.cols) gameState.cols = importedState.cols;
                    if(importedState.categories) gameState.categories = importedState.categories;
                    if(importedState.players) gameState.players = importedState.players;
                    if(importedState.clues) gameState.clues = importedState.clues;

                    sendAction('syncState', {});
                    render();
                } catch (error) {
                    alert("Invalid file structure.");
                }
            };
            reader.readAsText(file);
        }

        // --- Core Application Logic ---
        function toggleMode() {
            const checkbox = document.getElementById('modeToggle');
            gameState.isController = checkbox.checked;
            
            const label = document.getElementById('modeLabel');
            const hostControls = document.getElementById('hostControls');
            const modalHostButtons = document.getElementById('modalHostButtons');

            if(gameState.isController) {
                label.innerText = "Host Controller Mode";
                label.classList.add("text-blue-400");
                hostControls.classList.remove("hidden");
                modalHostButtons.classList.remove("hidden");
                sendAction('syncState', {});
            } else {
                label.innerText = "Screen Mode (TV)";
                label.classList.remove("text-blue-400");
                hostControls.classList.add("hidden");
                modalHostButtons.classList.add("hidden");
            }
            render();
        }

        function editCategoryHeader(colIndex) {
            if (!gameState.isController) return;
            const currentName = gameState.categories[colIndex] || `Category ${colIndex + 1}`;
            const newName = prompt(`Enter title for Column ${colIndex + 1}:`, currentName);
            if (newName) {
                gameState.categories[colIndex] = newName;
                sendAction('syncState', {});
                render();
            }
        }

        function adjustGrid(type, delta) {
            if(type === 'col') gameState.cols = Math.max(1, Math.min(7, gameState.cols + delta));
            if(type === 'row') gameState.rows = Math.max(1, Math.min(6, gameState.rows + delta));
            sendAction('syncState', {});
        }

        function adjustPlayers(delta) {
            if (delta > 0 && gameState.players.length < 6) {
                gameState.players.push({ name: `Player ${gameState.players.length + 1}`, score: 0 });
            } else if (delta < 0 && gameState.players.length > 1) {
                gameState.players.pop();
            }
            sendAction('syncState', {});
        }

        function updateScore(pIndex, amount) {
            gameState.players[pIndex].score += amount;
            sendAction('syncState', {});
        }

        function toggleDD(col, row, event) {
            event.stopPropagation();
            const key = `${col}-${row}`;
            gameState.clues[key].isDD = !gameState.clues[key].isDD;
            sendAction('syncState', {});
        }

        function renamePlayer(index, newName) {
            if(newName) {
                gameState.players[index].name = newName;
                sendAction('syncState', {});
            }
        }

        // --- Rendering Engine ---
        function render() {
            document.getElementById('playerCountDisplay').innerText = gameState.players.length;
            renderBoard();
            renderPlayers();
            renderModal();
        }

        function renderBoard() {
            const gridContainer = document.getElementById('jeopardyGrid');
            gridContainer.style.gridTemplateColumns = `repeat(${gameState.cols}, minmax(0, 1fr))`;
            gridContainer.innerHTML = '';

            for (let c = 0; c < gameState.cols; c++) {
                const header = document.createElement('div');
                const catName = gameState.categories[c] || `Category ${c+1}`;
                
                if (gameState.isController) {
                    header.className = "bg-blue-900 border-2 border-dashed border-blue-500 hover:bg-blue-800 p-3 text-center font-bold tracking-wider rounded-t-lg truncate text-sm md:text-base cursor-pointer text-yellow-300";
                    header.innerHTML = `📝 ${catName}`;
                    header.setAttribute('onclick', `editCategoryHeader(${c})`);
                } else {
                    header.className = "bg-blue-900 border border-blue-700 p-3 text-center font-bold tracking-wider rounded-t-lg truncate text-sm md:text-base";
                    header.innerText = catName;
                }
                gridContainer.appendChild(header);
            }

            for (let r = 0; r < gameState.rows; r++) {
                for (let c = 0; c < gameState.cols; c++) {
                    const key = `${c}-${r}`;
                    const clue = gameState.clues[key];
                    const card = document.createElement('div');
                    
                    if (clue.isRead) {
                        card.className = "bg-slate-800/40 border border-slate-800 text-slate-600 flex flex-col justify-center items-center h-24 rounded-lg text-xl font-bold select-none";
                        card.innerText = "---";
                    } else {
                        card.className = `clue-card bg-blue-800 border-2 border-blue-600 text-yellow-400 flex flex-col justify-between items-center p-2 h-24 rounded-lg shadow-lg text-center font-black text-xl md:text-2xl cursor-pointer select-none`;
                        
                        if (gameState.isController) {
                            card.setAttribute('onclick', `sendAction('openClue', {col: ${c}, row: ${r}})`);
                            
                            // Check mark helper symbol indicates present media attachments on card matrix cell
                            const mediaIndicator = (clue.mediaType && clue.mediaType !== 'none') ? "🖼️ " : "";
                            
                            card.innerHTML = `
                                <div class="flex justify-between w-full">
                                    <button onclick="toggleDD(${c}, ${r}, event)" class="text-[10px] px-1 rounded ${clue.isDD ? 'bg-amber-500 text-slate-900 font-bold' : 'bg-slate-700 text-slate-300'}">DD</button>
                                    <button onclick="openMediaEditor(${c}, ${r}, event)" class="text-[10px] bg-slate-700 hover:bg-slate-600 px-1 rounded text-white">✏️</button>
                                </div>
                                <span class="mb-2 text-sm md:text-xl">${mediaIndicator}$${clue.value}</span>
                            `;
                        } else {
                            card.innerHTML = `<div class="m-auto">$${clue.value}</div>`;
                        }
                    }
                    gridContainer.appendChild(card);
                }
            }
        }

        function renderPlayers() {
            const container = document.getElementById('playersContainer');
            container.innerHTML = '';

            gameState.players.forEach((player, index) => {
                const pBox = document.createElement('div');
                pBox.className = "bg-slate-800 border border-slate-700 p-3 rounded-xl text-center";
                
                if (gameState.isController) {
                    pBox.innerHTML = `
                        <input type="text" value="${player.name}" onchange="renamePlayer(${index}, this.value)" class="bg-transparent font-bold text-sm text-slate-300 text-center w-full focus:bg-slate-700 rounded mb-1">
                        <div class="text-2xl font-black text-emerald-400">${player.score}</div>
                    `;
                } else {
                    pBox.innerHTML = `
                        <div class="font-bold text-lg text-slate-200 truncate">${player.name}</div>
                        <div class="text-3xl font-black text-yellow-400">${player.score}</div>
                    `;
                }
                container.appendChild(pBox);
            });
        }

        function renderModal() {
            const modal = document.getElementById('clueModal');
            const mediaContainer = document.getElementById('modalMediaContainer');
            
            if (!gameState.activeClue) {
                modal.classList.add('hidden');
                mediaContainer.innerHTML = ''; // Wipe embed content if closed
                return;
            }

            modal.classList.remove('hidden');
            const key = `${gameState.activeClue.col}-${gameState.activeClue.row}`;
            const clue = gameState.clues[key];

            document.getElementById('modalCategory').innerText = gameState.categories[gameState.activeClue.col] || "Category";
            document.getElementById('modalValue').innerText = `$${clue.value}`;
            
            const ddBanner = document.getElementById('dailyDoubleBanner');
            if (clue.isDD) ddBanner.classList.remove('hidden');
            else ddBanner.classList.add('hidden');

            // --- RENDER CLUE QUESTION MEDIA ATTACHMENTS ---
            mediaContainer.innerHTML = '';
            
            // Only render media attachments while displaying the question, clear it on answer flip
            if (!gameState.showingAnswer && clue.mediaType && clue.mediaType !== 'none' && clue.mediaUrl) {
                mediaContainer.classList.remove('hidden');
                
                if (clue.mediaType === 'link' || clue.mediaType === 'file') {
                    const img = document.createElement('img');
                    img.src = clue.mediaUrl;
                    img.className = "mx-auto max-h-64 md:max-h-80 object-contain rounded-lg border border-slate-700 shadow-md";
                    mediaContainer.appendChild(img);
                } else if (clue.mediaType === 'youtube') {
                    const wrap = document.createElement('div');
                    wrap.className = "aspect-video w-full max-w-xl mx-auto";
                    wrap.innerHTML = `
                        <iframe class="w-full h-full rounded-lg border border-slate-700 shadow-md" 
                                src="${clue.mediaUrl}" 
                                frameborder="0" 
                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                                allowfullscreen>
                        </iframe>`;
                    mediaContainer.appendChild(wrap);
                }
            } else {
                mediaContainer.classList.add('hidden');
            }

            const textElement = document.getElementById('modalText');
            if (gameState.showingAnswer) {
                textElement.innerText = clue.answer;
                textElement.className = "text-3xl md:text-5xl font-serif font-bold text-emerald-400 text-center leading-relaxed mb-6";
            } else {
                textElement.innerText = clue.question;
                textElement.className = "text-2xl md:text-4xl font-serif font-bold text-white text-center leading-relaxed mb-6";
            }

            // Dynamic Modal Score Setup
            const scorePanel = document.getElementById('modalScorePanel');
            scorePanel.innerHTML = '';

            if (gameState.isController) {
                let targetValue = clue.value;
                gameState.players.forEach((player, idx) => {
                    const row = document.createElement('div');
                    row.className = "bg-slate-800 p-2 rounded border border-slate-700 text-center flex flex-col items-center justify-between";
                    row.innerHTML = `
                        <div class="text-xs font-medium text-slate-300 truncate w-full mb-1">${player.name}</div>
                        <div class="flex gap-2">
                            <button onclick="updateScore(${idx}, ${targetValue})" class="bg-emerald-600 hover:bg-emerald-500 text-xs px-2 py-1 rounded font-black text-white">+ $${targetValue}</button>
                            <button onclick="updateScore(${idx}, -${targetValue})" class="bg-rose-600 hover:bg-rose-500 text-xs px-2 py-1 rounded font-black text-white">- $${targetValue}</button>
                        </div>
                    `;
                    scorePanel.appendChild(row);
                });
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            updateRoomConnection();
        });
        initClues();
        render();
    </script>
</body>
</html>
